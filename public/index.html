<!doctype html>
<html lang="zh-HK">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartPLAY 羽毛球空場查詢</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin: 24px; }
      form { display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 12px; max-width: 920px; }
      input, button { padding: 10px; font-size: 14px; }
      button { cursor: pointer; }
      table { border-collapse: collapse; width: 100%; margin-top: 20px; }
      th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
      th { background: #f5f5f5; }
      .ok { color: #0a7f2e; font-weight: 600; }
      .muted { color: #666; }
      .error { color: #a31313; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h2>SmartPLAY 羽毛球空場查詢（MVP）</h2>
    <p class="muted">輸入日期與時段，查詢可用場次（目前為可擴充骨架，需按實際 DOM selector 微調）。</p>

    <form id="qform">
      <label>日期 <input type="date" id="date" required /></label>
      <label>地區 <input type="text" id="district" placeholder="例如：灣仔區" /></label>
      <label>場地 <input type="text" id="venue" placeholder="例如：伊利沙伯體育館" /></label>
      <label>開始時間 <input type="time" id="startTime" value="18:00" /></label>
      <label>結束時間 <input type="time" id="endTime" value="22:00" /></label>
      <div style="display:flex;align-items:end;"><button type="submit">查詢空場</button></div>
    </form>

    <div id="status" class="muted" style="margin-top:12px;"></div>
    <div id="error" class="error"></div>

    <table id="result" hidden>
      <thead>
        <tr><th>場地</th><th>場</th><th>開始</th><th>結束</th><th>狀態</th></tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      const form = document.getElementById('qform');
      const statusEl = document.getElementById('status');
      const errEl = document.getElementById('error');
      const table = document.getElementById('result');
      const tbody = table.querySelector('tbody');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errEl.textContent = '';
        table.hidden = true;
        tbody.innerHTML = '';
        statusEl.textContent = '查詢中，請稍候...';

        const payload = {
          date: document.getElementById('date').value,
          district: document.getElementById('district').value || undefined,
          venue: document.getElementById('venue').value || undefined,
          activity: 'badminton',
          startTime: document.getElementById('startTime').value || undefined,
          endTime: document.getElementById('endTime').value || undefined
        };

        try {
          const resp = await fetch('/api/availability', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await resp.json();
          if (!resp.ok || !data.ok) throw new Error(data.error || 'Unknown error');

          const slots = data.slots || [];
          if (!slots.length) {
            statusEl.textContent = '暫時未找到空場（或 selector 尚未對齊實站）。';
            return;
          }

          for (const s of slots) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${s.venue}</td><td>${s.court}</td><td>${s.start}</td><td>${s.end}</td><td class="ok">${s.status}</td>`;
            tbody.appendChild(tr);
          }
          table.hidden = false;
          statusEl.textContent = `找到 ${slots.length} 筆記錄`;
        } catch (err) {
          statusEl.textContent = '';
          errEl.textContent = String(err?.message || err);
        }
      });
    </script>
  </body>
</html>
