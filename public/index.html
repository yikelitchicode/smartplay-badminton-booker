<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smartplay Badminton Booker</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; line-height: 1.5; color: #111; }
    .row { display: grid; gap: 12px; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); margin-bottom: 12px; }
    label { display: grid; gap: 6px; font-size: 14px; }
    input, button { font: inherit; padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; }
    button { cursor: pointer; background: #111; color: white; border-color: #111; }
    button.secondary { background: white; color: #111; }
    pre { background: #f6f8fa; padding: 12px; border-radius: 8px; overflow: auto; }
    .status { font-weight: 700; }
    .status.available { color: #0a7a2f; }
    .status.booked { color: #b42318; }
    .status.unknown, .status.manual-confirmation-required { color: #7a5d00; }
    .error { color: #b42318; }
    .ok { color: #0a7a2f; }
  </style>
</head>
<body>
  <h1>Smartplay Badminton Booker</h1>
  <p>查詢場地可用性、顯示每個 slot 的 status，並把 API 錯誤直接顯示出來。</p>

  <form id="query-form">
    <div class="row">
      <label>Date<input id="date" type="date" required /></label>
      <label>District<input id="district" type="text" placeholder="e.g. Kowloon" /></label>
      <label>Venue<input id="venue" type="text" placeholder="e.g. Leisure Centre" /></label>
      <label>Activity<input id="activity" type="text" value="badminton" /></label>
      <label>Start Time<input id="startTime" type="time" /></label>
      <label>End Time<input id="endTime" type="time" /></label>
    </div>
    <div class="row">
      <button type="submit">Check availability</button>
      <button type="button" class="secondary" id="clear-btn">Clear</button>
    </div>
  </form>

  <div id="message"></div>
  <h2>Result</h2>
  <div id="result">No query yet.</div>

  <script>
    const form = document.getElementById('query-form');
    const message = document.getElementById('message');
    const result = document.getElementById('result');
    const clearBtn = document.getElementById('clear-btn');

    function setMessage(text, kind = '') {
      message.className = kind;
      message.textContent = text || '';
    }

    function renderSlots(slots) {
      if (!slots || !slots.length) return '<p>No slots returned.</p>';
      return '<ul>' + slots.map(slot => {
        const status = slot.status || 'unknown';
        return `<li><span class="status ${status}">${status}</span> — ${slot.venue || ''} ${slot.court || ''} ${slot.start || ''}-${slot.end || ''}</li>`;
      }).join('') + '</ul>';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      setMessage('Loading...', '');
      result.innerHTML = '';

      const payload = {
        date: document.getElementById('date').value,
        district: document.getElementById('district').value.trim() || undefined,
        venue: document.getElementById('venue').value.trim() || undefined,
        activity: document.getElementById('activity').value.trim() || 'badminton',
        startTime: document.getElementById('startTime').value || undefined,
        endTime: document.getElementById('endTime').value || undefined
      };

      try {
        const resp = await fetch('/api/availability', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await resp.json();
        if (!resp.ok || !data.ok) {
          throw new Error(data.error || `Request failed (${resp.status})`);
        }
        setMessage(`Loaded ${data.slots?.length || 0} slots`, 'ok');
        result.innerHTML = `<pre>${renderSlots(data.slots)}</pre>`;
      } catch (err) {
        setMessage(err.message || String(err), 'error');
        result.innerHTML = '<p class="error">Failed to load availability.</p>';
      }
    });

    clearBtn.addEventListener('click', () => {
      form.reset();
      document.getElementById('activity').value = 'badminton';
      setMessage('');
      result.textContent = 'No query yet.';
    });
  </script>
</body>
</html>
